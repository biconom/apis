syntax = "proto3";

package biconom.client.rank.v1;

import "biconom/type/account.proto";
import "biconom/type/rank.proto";
import "biconom/type/condition.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/biconom/go-genproto/biconom/client/rank/v1;service_client_rank_pb";

service Rank {
  rpc GetBuckets (google.protobuf.Empty) returns (GetBucketsResponse) {} // Отобразить список ранговых систем
  rpc GetBucket (biconom.type.RankBucket.Id) returns (biconom.type.RankBucket) {} // Отобразить данные ранговой системы
  rpc GetBucketRanks (biconom.type.RankBucket.Id) returns (GetBucketRanksResponse) {} // Отобразить список рангов в ранговой системе
  rpc GetBucketRank (BucketRankRequest) returns (biconom.type.Rank) {} // Отобразить данные ранга в ранговой системе
  rpc GetBucketRankConditionBucket (BucketRankRequest) returns (biconom.type.ConditionBucket) {} // Отобразить условия для достижения ранга в ранговой системе

  rpc GetAccountBuckets (biconom.type.Account.Id) returns (GetAccountBucketsResponse) {} // Отобразить список ранговых систем (выбранного аккаунта)
  rpc GetAccountBucket (AccountBucketRequest) returns (biconom.type.Account.WrappedRankBucket) {} // Отобразить данные ранговой системы (выбранного аккаунта)
  rpc GetAccountBucketRanks (AccountBucketRequest) returns (GetAccountBucketRanksResponse) {} // Отобразить список рангов в ранговой системе (выбранного аккаунта)
  rpc GetAccountBucketRank (AccountBucketRankRequest) returns (biconom.type.Account.WrappedRank) {} // Отобразить данные ранга в ранговой системе (выбранного аккаунта)
  rpc GetAccountBucketRankConditionBucket (AccountBucketRankRequest) returns (biconom.type.ConditionBucket) {} // Отобразить условия для достижения ранга в ранговой системе (выбранного аккаунта)
}

message BucketRankRequest {
  biconom.type.RankBucket.Id bucket_unique_field = 1;
  biconom.type.Rank.Id rank_unique_field = 2;
}
message AccountBucketRequest {
  biconom.type.Account.Id account_unique_field = 1;
  biconom.type.RankBucket.Id bucket_unique_field = 2;
}
message AccountBucketRankRequest {
  biconom.type.Account.Id account_unique_field = 1;
  biconom.type.RankBucket.Id bucket_unique_field = 2;
  biconom.type.Rank.Id rank_unique_field = 3;
}

message GetBucketsResponse {
  repeated biconom.type.RankBucket buckets = 1;
}
message GetBucketRanksResponse {
  repeated biconom.type.Rank ranks = 1;
}
message GetAccountBucketsResponse {
  repeated biconom.type.Account.WrappedRankBucket buckets = 1;
}
message GetAccountBucketRanksResponse {
  repeated biconom.type.Account.WrappedRank ranks = 1;
}
