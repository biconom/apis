syntax = "proto3";

package biconom.client.confirmation.v1;

import "biconom/type/agent.proto";
import "biconom/type/confirmation.proto";
import "biconom/type/filter.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";

option go_package = "github.com/biconom/go-genproto/biconom/client/confirmation/v1;service_client_confirmation_pb";

service Confirmation {
  rpc GetConfirmations (biconom.type.Filter) returns (GetConfirmationsResponse) {} // список форм подтверждения
  rpc GetConfirmation (ConfirmationRequest) returns (biconom.type.Confirmation) {} // отобразить форму подтверждения
  rpc GetConfirmationLogs (ConfirmationRequest) returns (GetConfirmationLogsResponse) {} // история изменений в форме подтверждения
  rpc GetConfirmationLog (ConfirmationLogRequest) returns (biconom.type.Confirmation.Log) {} // отобразить запись в истории изменений в форме подтверждения
  rpc GenerateOneTimePassword (GenerateOneTimePasswordRequest) returns (biconom.type.Confirmation.Field.Notification) {} // сгенерировать "OneTimePassword" для поля в форме подтверждения
  rpc Confirm (ConfirmRequest) returns (ConfirmResponse) {} // верифицировать форму подтверждения
  rpc Cancel (ConfirmationRequest) returns (google.protobuf.Empty) {} // отменить форму подтверждения
}

message ConfirmationRequest {
  oneof unique_field {
    uint64 confirmation_id = 1;
    biconom.type.Confirmation.Method.Id method_id = 2;
  }
}
message ConfirmationLogRequest {
  oneof unique_field {
    uint64 confirmation_id = 1;
    biconom.type.Confirmation.Method.Id method_id = 2;
  }
  uint32 log_id = 3;
}
message ConfirmRequest {
  biconom.type.Agent agent = 1; // данные об клиет-агенте с которого выполняется запрос
  biconom.type.Confirmation.Id confirmation_id = 2; // идентификатор формы подтверждения
  map<uint32, string> field_values = 3; // map key is "field_id"
}
message ConfirmResponse {
  bool success = 1;
  map<uint32, biconom.type.Confirmation.Field.Status> field_statuses = 2; // map key is "field_id"
  google.protobuf.Any metadata = 3;
}
message GenerateOneTimePasswordRequest {
  biconom.type.Agent agent = 1; // данные об клиет-агенте с которого выполняется запрос
  biconom.type.Confirmation.Id confirmation_id = 2; // идентификатор формы подтверждения
  uint32 field_id = 3; // идентификатор поля
}
message GetConfirmationsResponse {
  repeated biconom.type.Confirmation confirmations = 1;
}
message GetConfirmationLogsResponse {
  repeated biconom.type.Confirmation.Log logs = 1;
}
