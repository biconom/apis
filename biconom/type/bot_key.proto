syntax = "proto3";

package biconom.type;

import "biconom/type/until.proto";

option go_package = "github.com/biconom/go-genproto/biconom/type/bot_key;bot_key_pb";

message BotKey {
  message ID {
    uint32 bot_key_id = 1;
  }
  uint32 bot_key_id = 1;
  string bot_key_title = 2;
  string token = 3;
  biconom.type.Until ttl = 4;
  repeated string ip_masks = 5;
}
